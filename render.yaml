services:
  # ── FastAPI Backend Web Service ──────────────────────────────────────────
  - type: web
    name: agrishield-backend
    runtime: docker
    dockerfilePath: Dockerfile.backend
    dockerContext: .
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: agrishield-db
          property: connectionString
      - key: API_KEY
        value: agrishield-dev-2026
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_API_KEY
        sync: false  # Paste your Google Gemini API Key in the Render dashboard
      - key: CORS_ORIGINS
        value: "*"  # Allows the static site to communicate with the API

  # ── React Frontend Static Site ────────────────────────────────────────────
  - type: web
    name: agrishield-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://agrishield-backend-numu.onrender.com
      - key: VITE_API_KEY
        value: agrishield-dev-2026

databases:
  # ── Managed PostgreSQL Database ──────────────────────────────────────────
  - name: agrishield-db
    plan: free
    databaseName: agri_fraud
